name: publish-cli-tarballs
on:
  push:
    tags: [ 'cli-v*' ]
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         platform: darwin-arm64 }
          - { os: macos-13,         platform: darwin-x64 }
          - { os: ubuntu-22.04,     platform: linux-x64 }
          - { os: ubuntu-22.04-arm, platform: linux-arm64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: cd apps/vscode-extension && node scripts/build-cli-tarballs.mjs --platform=${{ matrix.platform }}
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: apps/vscode-extension/dist-cli/*

  release:
    needs: build
    # Best-effort: publish whatever DID build, even if a platform leg failed
    # or stalled in queue. Without this, a single missing runner (notably
    # macos-13 for darwin-x64) blocks the entire release indefinitely.
    # We still require ≥1 successful build so we never ship an empty release.
    if: ${{ always() && !cancelled() && contains(needs.build.result, 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist-cli
          pattern: cli-*
          merge-multiple: true
      - name: List artifacts
        run: ls -lh dist-cli/
      - name: Verify at least one tarball present
        run: |
          count=$(ls dist-cli/ctxloom-cli-*.tar.gz 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No tarballs to publish — every build leg failed."
            exit 1
          fi
          echo "Publishing $count platform tarball(s)."
      - name: Note missing platforms
        run: |
          for plat in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            if ! ls dist-cli/ctxloom-cli-*-${plat}.tar.gz >/dev/null 2>&1; then
              echo "::warning::Platform ${plat} missing from this release (build leg failed or stalled)."
            fi
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-cli/ctxloom-cli-*.tar.gz*
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
