name: publish-cli-tarballs
on:
  push:
    tags: [ 'cli-v*' ]
permissions:
  contents: write

# Two parallel build paths so a slow/queue-prone platform can't gate the
# release. The release job only depends on the fast matrix; the slow leg
# runs alongside and uploads its artifact whenever it finishes (or doesn't).
#
# Why split: GitHub Actions evaluates `needs:` after the matrix reaches a
# terminal state. A queued-not-running leg is not terminal — so a single
# stalled runner blocks the dependent job for up to 24h. Splitting moves
# the unreliable platform out of the release's critical path.

# Opt into Node.js 24 for actions/checkout@v4 + actions/setup-node@v4.
# GitHub forces this by June 2026; setting it explicitly silences the
# deprecation warning and gives us forward-compatible behavior today.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    # Fast, reliable platforms — release waits on these.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         platform: darwin-arm64 }
          - { os: ubuntu-22.04,     platform: linux-x64 }
          - { os: ubuntu-22.04-arm, platform: linux-arm64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: node scripts/cli-tarballs/build-cli-tarballs.mjs --platform=${{ matrix.platform }}
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: dist-cli/*

  build-darwin-x64:
    # Intel Mac — flaky runner queue (macos-13). Best-effort: runs in
    # parallel, doesn't gate the release. If it finishes before `release`
    # downloads artifacts, the tarball is included; otherwise the release
    # publishes without it and CliInstaller surfaces a clear 404 on Intel
    # Mac users with the npm fallback path.
    runs-on: macos-13
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: node scripts/cli-tarballs/build-cli-tarballs.mjs --platform=darwin-x64
      - uses: actions/upload-artifact@v4
        with:
          name: cli-darwin-x64
          path: dist-cli/*

  release:
    needs: build
    # Defensive: still require ≥1 fast-matrix success so we never publish empty.
    if: ${{ always() && !cancelled() && contains(needs.build.result, 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: dist-cli
          pattern: cli-*
          merge-multiple: true
      - name: List artifacts
        run: ls -lh dist-cli/
      - name: Verify at least one tarball present
        run: |
          count=$(ls dist-cli/ctxloom-cli-*.tar.gz 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No tarballs to publish — every build leg failed."
            exit 1
          fi
          echo "Publishing $count platform tarball(s)."
      - name: Note missing platforms
        run: |
          for plat in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            if ! ls dist-cli/ctxloom-cli-*-${plat}.tar.gz >/dev/null 2>&1; then
              echo "::warning::Platform ${plat} missing from this release (build leg failed or stalled). Users on this platform should fall back to 'npm install -g ctxloom-pro'."
            fi
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-cli/ctxloom-cli-*.tar.gz*
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
