name: pr-bot deploy

# Builds the pr-bot Docker image and deploys to Fly.io whenever main
# advances with changes in apps/pr-bot/** or its dependencies. Also
# supports manual dispatch for hotfixes / re-deploys without a code
# change.
#
# Repo configuration required (Settings → Secrets and variables → Actions):
#   - Secret: FLY_API_TOKEN — Fly.io deploy token scoped to ctxloom-pr-bot
#
# If FLY_API_TOKEN is unset, the workflow logs a warning annotation and
# exits cleanly so first-time setup doesn't break main.
on:
  push:
    branches: [main]
    paths:
      - 'apps/pr-bot/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pr-bot-deploy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: pr-bot-deploy
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify FLY_API_TOKEN is present
        id: gate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::FLY_API_TOKEN secret unset — pr-bot deploy skipped. Configure in Settings → Secrets and variables → Actions."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Install flyctl
        if: steps.gate.outputs.skip == '0'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Read root version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Deploy to Fly.io
        if: steps.gate.outputs.skip == '0'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config apps/pr-bot/fly.toml \
            --dockerfile apps/pr-bot/Dockerfile \
            --remote-only \
            --image-label "v${{ steps.version.outputs.version }}-${GITHUB_SHA::7}"
