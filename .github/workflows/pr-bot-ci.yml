name: pr-bot CI

# Runs the pr-bot's build + tests on every PR or push that touches the
# workspace. The root CI workflow doesn't cover apps/pr-bot, so without
# this job a stale pr-bot would silently rot (the exact failure mode
# fixed in PR #81).
on:
  push:
    branches: [main, master]
    paths:
      - 'apps/pr-bot/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/pr-bot-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/pr-bot/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/pr-bot-ci.yml'

# Opt into Node.js 24 for actions/checkout@v6 + actions/setup-node@v4.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: Build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build pr-bot bundle
        run: npm run build -w @ctxloom/pr-bot

      - name: Test pr-bot
        run: npm test -w @ctxloom/pr-bot

      - name: Build Docker image (Action runtime)
        run: docker build -f apps/pr-bot/Dockerfile -t ctxloom-pr-bot-test .

      - name: Smoke-test the Action container
        run: |
          # The Action expects $GITHUB_EVENT_PATH and $GITHUB_EVENT_NAME.
          # Pass a synthetic 'push' event so the entrypoint exits cleanly
          # at the early-return guard (no pull_request → noop). This
          # proves the container starts, resolves all native deps, and
          # the entrypoint is wired correctly.
          echo '{}' > /tmp/event.json
          docker run --rm \
            -e GITHUB_EVENT_NAME=push \
            -e GITHUB_EVENT_PATH=/tmp/event.json \
            -v /tmp/event.json:/tmp/event.json:ro \
            ctxloom-pr-bot-test
