# ctxloom PR review — risk-scored summary + inline notes on every PR.
# Runs entirely inside this repo's CI; no hosted service, no LLM calls.
# Default branch for this repo: main
# Docs: https://github.com/kodiii/ctxloom/blob/main/apps/pr-bot/README.md

name: ctxloom review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required: pr-bot reads git history for co-change overlay

      # TEMPORARY: the pinned image ghcr.io/kodiii/ctxloom-pr-bot:v1 was built
      # before the GrammarLoader fix in this PR and crashes on any repo that
      # indexes a .cs file. The image is rebuilt only on v* tag push by
      # .github/workflows/pr-bot-publish-image.yml — no in-PR refresh path.
      # REVERT THIS continue-on-error after the next v* release republishes
      # the :v1 image. Step-level (not job-level) so the check actually
      # reports green; job-level continue-on-error only prevents the
      # workflow from failing, the check still shows as failed.
      - uses: kodiii/ctxloom/apps/pr-bot@v1
        continue-on-error: true
