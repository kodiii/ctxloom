# ctxloom PR review — risk-scored summary + inline notes on every PR.
# Runs entirely inside this repo's CI; no hosted service, no LLM calls.
# Default branch for this repo: main
# Docs: https://github.com/kodiii/ctxloom/blob/main/apps/pr-bot/README.md

name: ctxloom review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest
    # TEMPORARY: the pinned image ghcr.io/kodiii/ctxloom-pr-bot:v1 was built
    # before the GrammarLoader fix in this PR and crashes on any repo that
    # indexes a .cs file. The image will be republished on the next v* tag
    # after this merges. REVERT THIS LINE in the same PR that tags the new
    # release (or in an immediate follow-up). Tracked in commit body.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required: pr-bot reads git history for co-change overlay

      - uses: kodiii/ctxloom/apps/pr-bot@v1
