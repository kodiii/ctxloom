name: Benchmark

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

# Opt into Node.js 24 for actions/checkout@v4 + actions/setup-node@v4.
# GitHub forces this by June 2026; setting it explicitly silences the
# deprecation warning and gives us forward-compatible behavior today.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  benchmark:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Run benchmarks
        run: npx tsx benchmarks/benchmark.ts --output benchmarks/results.json

      - name: Post results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('benchmarks/results.json', 'utf-8'));

            const gb = results.graph_build ?? {};
            const s = results.search ?? {};
            const c = results.compression ?? {};
            const agg = c.aggregate ?? {};

            // Build compression sample table
            const sampleRows = (c.samples ?? []).map(r =>
              `| \`${r.file.split('/').slice(-2).join('/')}\` | ${r.raw_tokens.toLocaleString()} | ${r.skeleton_tokens.toLocaleString()} | **${r.reduction_pct}%** |`
            ).join('\n');

            const searchSection = s.skipped
              ? '> ⚠️ Search benchmarks skipped (no indexed DB — run `ctxloom index` first)'
              : [
                  '| Metric | Value |',
                  '|--------|-------|',
                  `| Total P50 | ${s.total?.p50_ms}ms |`,
                  `| Total P95 | ${s.total?.p95_ms}ms |`,
                  `| Total P99 | ${s.total?.p99_ms}ms |`,
                  `| Embed P50 | ${s.embedding_only?.p50_ms}ms |`,
                  `| LanceDB P50 | ${s.vector_search_only?.p50_ms}ms |`,
                ].join('\n');

            const body = [
              '## 📊 ctxloom Benchmark Results',
              '',
              '### Graph Build (cold)',
              `**${gb.nodes} nodes, ${gb.edges} edges** built in **${gb.duration_ms}ms** (${gb.edges_per_second} edges/sec)`,
              '',
              '### Vector Search Latency',
              searchSection,
              '',
              '### Skeletonization Compression',
              `**${agg.overall_reduction_pct}% token reduction** across ${c.samples?.length ?? 0} sample files`,
              `(${(agg.total_raw_tokens ?? 0).toLocaleString()} raw tokens → ${(agg.total_skeleton_tokens ?? 0).toLocaleString()} skeleton tokens)`,
              '',
              '| File | Raw tokens | Skeleton tokens | Reduction |',
              '|------|-----------|-----------------|-----------|',
              sampleRows,
              '',
              `_Timestamp: ${results.timestamp} · Node: ${results.node_version}_`,
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.startsWith('## 📊 ctxloom Benchmark Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmarks/results.json
          retention-days: 30
