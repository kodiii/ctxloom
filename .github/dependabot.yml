# Dependabot configuration for ctxloom.
#
# Rationale (post-mortem of PR #203 — closed because it bundled
# postcss security patches with a vite 5 → 8 major upgrade and a
# broken lockfile):
#
#   The default Dependabot behavior groups major + minor + patch
#   updates of related packages together. That conflates two
#   fundamentally different kinds of change:
#
#     1. Security patches → almost always safe, should land fast.
#     2. Major-version bumps → may break builds, require migration
#        work, and need code/config changes alongside the bump.
#
#   When those land in one PR, the security patch gets blocked by
#   the migration work AND the lockfile may end up partially
#   regenerated (PR #203's actual failure mode: `npm ci` couldn't
#   resolve vite 8's new transitive deps because lightningcss +
#   rolldown were absent from the lockfile).
#
# This config splits them deliberately:
#
#   - Security updates ship as their own PRs (single dependency,
#     never grouped with anything else)
#   - Major updates are ignored for the production-runtime packages
#     where a major bump needs migration (vite, react, typescript,
#     vitest, eslint, lance, etc.) — Dependabot can still suggest
#     them via security alerts; humans drive them through manual
#     migration PRs.
#   - Patch + minor updates of dev-only tooling can group safely.
#
# Reference: docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
# Schema: docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ─── Root package (ctxloom-pro CLI + MCP server) ────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Lisbon"
    # Cap concurrent PRs so a burst of bumps doesn't drown the
    # review queue (we saw 5+ Dependabot PRs land at once during
    # v1.7.0 work).
    open-pull-requests-limit: 5
    # Security updates ALWAYS get their own PR — never grouped.
    # This is the lesson from #203 (postcss security patches were
    # held hostage by an unrelated vite major bump).
    groups:
      # Dev-tooling minor/patch bumps can safely group — they don't
      # touch the production code path. Eslint plugins / type
      # packages / vitest minor updates etc.
      dev-tooling:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        # Exclude packages where even a "minor" version can ship
        # behavior changes that break our test suite (vitest in
        # particular has shipped subtle assertion changes in
        # minor releases historically).
        exclude-patterns:
          - "vitest"
          - "@vitest/*"
          - "eslint"
    # Runtime packages where a major bump needs migration — never
    # auto-PR a major. Dependabot will still raise SECURITY alerts
    # for these via the Security tab if a CVE applies; the human
    # decides whether to do the migration manually.
    ignore:
      # Vite ecosystem (PR #203 tried to push vite 5 → 8 alongside
      # a postcss security patch and a broken lockfile)
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/*"
        update-types: ["version-update:semver-major"]
      # Test framework — minor bumps occasionally ship breaking
      # assertion changes that look like real test failures
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
      # TypeScript major bumps can reshape strictness — usually
      # we want to opt into a major TS bump deliberately
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Build tooling
      - dependency-name: "tsx"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tsup"
        update-types: ["version-update:semver-major"]
      # Vector DB — pre-1.0 (0.x), so SEMVER MINOR IS BREAKING per
      # the semver spec. Block both major and minor bumps; only
      # patches are safe-by-default. PR #235 (0.27 → 0.29) reshaped
      # the LanceDB table layout — would have broken every existing
      # user's vector index.
      - dependency-name: "@lancedb/lancedb"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # ONNX runtime — model compat across versions
      - dependency-name: "onnxruntime-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@huggingface/transformers"
        update-types: ["version-update:semver-major"]
      # Tree-sitter — pre-1.0 package; semver MINOR is breaking
      # (the WASM API and grammar binding shape can shift across
      # 0.x.y minors). PR #241 (0.25 → 0.26) would have risked
      # silent grammar incompatibility — block minor too.
      - dependency-name: "web-tree-sitter"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # File watcher — chokidar 4 reshaped its API
      - dependency-name: "chokidar"
        update-types: ["version-update:semver-major"]
      # Eslint — major versions ship config-shape changes
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]
      # ── Follow-up additions after the post-#207 backlog flush ─────
      # The initial Dependabot run on the new config opened PRs for
      # these packages because the ignore-list wasn't comprehensive
      # enough. Closed those manually; locking the rule in here so
      # the next weekly run doesn't reopen them.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/supertest"
        update-types: ["version-update:semver-major"]
      # ── Round-2 additions (post-Monday-09:00 flush, PRs #227-238) ─
      # The first weekly run after #224 surfaced four more packages
      # whose majors slipped through. Same rationale as the prior
      # additions: major bumps reshape APIs and need a focused
      # migration PR, not a drive-by Dependabot auto-bump. Locking
      # in the rules so future weekly runs don't reopen them.
      - dependency-name: "@octokit/core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]
      # ── Round-3 additions (PRs #240-#247 from Monday's run) ───────
      # tailwind v4 is the "Oxide" rewrite — CSS-first config, new
      # PostCSS plugin shape, breaks the entire build pipeline.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # apache-arrow is a LanceDB transitive; arrow majors reshape
      # the array layout and have broken LanceDB table interop
      # historically. PR #246 proposed bumping THREE majors at once
      # (18 → 21) — the kind of change that needs focused validation.
      - dependency-name: "apache-arrow"
        update-types: ["version-update:semver-major"]
      # `open` is used by ctxloom dashboard to launch URLs in the
      # default browser. v11 changes the cross-platform launcher
      # signatures; major needs deliberate testing.
      - dependency-name: "open"
        update-types: ["version-update:semver-major"]
      # @types/express must match the runtime express version. We
      # ignore express majors above, so the matching types-major
      # would silently mismatch the runtime — block it too.
      - dependency-name: "@types/express"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    # Add a marker label so the review queue can filter
    # Dependabot PRs apart from our own work.
    labels:
      - "dependencies"
      - "automated"

  # ─── Dashboard app (vite + postcss + frontend toolchain) ────────
  # Same policy as root, separate ecosystem so a dashboard-only
  # bump doesn't accidentally touch the root lockfile.
  - package-ecosystem: "npm"
    directory: "/apps/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 3
    groups:
      dashboard-dev-tooling:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # See root config — same rationale for vite/typescript/etc.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # ── Post-#207 backlog catch-up additions ──────────────────────
      # express 5 is a substantial migration (deprecates body-parser,
      # changes router, async handler semantics) — kept out of
      # auto-PR per the same logic as the vite ignore.
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/supertest"
        update-types: ["version-update:semver-major"]
      # ── Round-2 additions (PRs #236, #237, #238) ──────────────────
      # react-router v7 reshapes the data-router APIs; recharts v3
      # rewrites the chart-component surface; jsdom v25+ changes
      # DOM polyfills. All three need focused migrations, not
      # auto-PRs.
      - dependency-name: "react-router"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]
      # ── Round-3 additions (PRs #243, #245, #247) ──────────────────
      # See root config for the same rationales — these packages
      # surfaced from the dashboard side of the Monday weekly run.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "open"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/express"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
      - "dashboard"

  # ─── PR-bot app (GitHub App for risk-scored PR reviews) ─────────
  - package-ecosystem: "npm"
    directory: "/apps/pr-bot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 3
    groups:
      pr-bot-dev-tooling:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
      # Octokit majors reshape the GitHub API client surface —
      # never auto-bump. We list `@octokit/core` explicitly in
      # addition to the `@octokit/*` glob because PR #232 (@octokit/core
      # 6 → 7) slipped through with the glob alone — Dependabot's
      # glob matching is conservative and may not always expand to
      # all sub-packages depending on the queue state.
      - dependency-name: "@octokit/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@octokit/core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@octokit/rest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@octokit/webhooks"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@octokit/auth-app"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@octokit/plugin-throttling"
        update-types: ["version-update:semver-major"]
      - dependency-name: "octokit"
        update-types: ["version-update:semver-major"]
      # ── Post-#207 backlog catch-up additions ──────────────────────
      # zod 4 is a substantial API rewrite (parse vs safeParse default,
      # new error format) — kept out of auto-PR.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/supertest"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
      - "pr-bot"

  # ─── GitHub Actions workflows ───────────────────────────────────
  # Keep actions/checkout, actions/setup-node, etc. fresh.
  # These rarely break and the security exposure is real (workflow
  # actions can leak secrets), so weekly is the right cadence.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 5
    # GitHub Actions ignore policy (added post-#225's mega-batch).
    # Dependabot likes to jump multiple majors at once on actions:
    # we saw actions/download-artifact propose 4 → 8 in a single PR,
    # actions/checkout 4 → 6, actions/setup-node 4 → 6. Multi-major
    # jumps reshape inputs/outputs across the gap and frequently
    # break workflows in non-obvious ways.
    #
    # Policy: ignore EVERY major bump on the actions we actually
    # use. Dependabot still issues PRs for patch and minor updates
    # (which are safe and useful), and the security tab still flags
    # CVEs. When we want to step up a major, we do it deliberately
    # in a focused PR.
    ignore:
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/cache"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/download-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/github-script"
        update-types: ["version-update:semver-major"]
      - dependency-name: "softprops/action-gh-release"
        update-types: ["version-update:semver-major"]
      # Docker actions usually advance majors carefully (the v6→v7
      # bumps in #208/#209/#212 merged cleanly), but a future
      # multi-major would still hurt — ignore majors for the docker/*
      # set too.
      - dependency-name: "docker/*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
      - "automated"
