# fly.toml — Fly.io deployment configuration for ctxloom-pr-bot
#
# Required secrets (set via `fly secrets set`):
#   APP_ID          — GitHub App ID from the app settings page
#   PRIVATE_KEY     — GitHub App private key (PEM, base64-encoded or raw)
#   WEBHOOK_SECRET  — Webhook secret configured in the GitHub App
#
# Optional secrets:
#   CTXLOOM_CACHE_DIR — overrides /var/lib/ctxloom-bot (usually left unset)

app = "ctxloom-pr-bot"
primary_region = "iad"

[build]
  dockerfile = "apps/pr-bot/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  count = 1

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    port = 3000
    timeout = "5s"

  [[http_service.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[http_service.ports]]
    handlers = ["tls", "http"]
    port = 443

[mounts]
  source = "ctxloom_data"
  destination = "/var/lib/ctxloom-bot"
  initial_size = "10gb"
